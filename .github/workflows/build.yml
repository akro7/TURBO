name: Build TURBO_FLASH_TOOL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install C++ Dependencies (vcpkg)
        shell: pwsh
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          .\vcpkg install fmt spdlog --triplet x64-windows-static
          .\vcpkg integrate install

      - name: Build C++ Engine (TURBO_FLASH_TOOL.exe)
        shell: pwsh
        run: |
          $VCPKG_PATH = $env:VCPKG_INSTALLATION_ROOT
          $VCPKG_INC = "$VCPKG_PATH\installed\x64-windows-static\include"
          $VCPKG_LIB = "$VCPKG_PATH\installed\x64-windows-static\lib"

          $sources = Get-ChildItem -Path "src" -Recurse -Include "*.cpp","*.c" | 
                     Where-Object { $_.FullName -notmatch "tests" } |
                     Select-Object -ExpandProperty FullName

          $includes = @(
            "/I src",
            "/I `"$VCPKG_INC`""
          ) -join " "

          $defines = @(
            "/D BROKKR_PLATFORM_WINDOWS",
            "/D WIN32",
            "/D WIN32_LEAN_AND_MEAN",
            "/D NOMINMAX",
            "/D _WIN32_WINNT=0x0A00",
            "/D SPDLOG_FMT_EXTERNAL",
            "/D FMT_HEADER_ONLY=0",
            "/D _CRT_SECURE_NO_WARNINGS"
          ) -join " "

          $flags = "/std:c++20 /O2 /MT /EHsc /utf-8 /Zc:__cplusplus /wd4005 /wd4996"

          $linkLibs = @(
            "Ws2_32.lib",
            "SetupAPI.lib",
            "User32.lib",
            "Advapi32.lib",
            "`"$VCPKG_LIB\fmt.lib`"",
            "`"$VCPKG_LIB\spdlog.lib`""
          ) -join " "

          $cmd = "cl.exe $flags $defines $includes $sources /Fe:TURBO_FLASH_TOOL.exe /link $linkLibs /MACHINE:X64"

          Write-Host $cmd
          Invoke-Expression $cmd

          if (!(Test-Path "TURBO_FLASH_TOOL.exe")) {
              throw "Build Failed!"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TURBO_FLASH_TOOL
          path: TURBO_FLASH_TOOL.exe
