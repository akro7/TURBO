name: Build EKOFLASH PRO (Full Integration)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-engine:
    name: Build C++ Odin Engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install fmt:x64-windows-static spdlog:x64-windows-static
          vcpkg integrate install

      - name: Fix xxhash - Generate xxhash.c from header-only vendor
        shell: pwsh
        run: |
          # xxhash in your repo is header-only (xxhash_vendor.h).
          # We generate a .c file that enables the implementation.
          $xxhashC = @"
          #define XXH_STATIC_LINKING_ONLY
          #define XXH_IMPLEMENTATION
          #include "xxhash_vendor.h"
          "@
          $xxhashC | Set-Content "src\third_party\xxhash\xxhash.c" -Encoding UTF8
          Write-Host "Generated xxhash.c successfully" -ForegroundColor Green

      - name: Fix namespace conflicts in md5_xxh3_cache
        shell: pwsh
        run: |
          # The file uses brokkr::core::Result and brokkr::core::Status
          # but these types live in brokkr::app namespace locally.
          # We inject a using directive at the top of the .cpp file.
          $file = "src\app\md5_xxh3_cache.cpp"
          if (Test-Path $file) {
            $content = Get-Content $file -Raw
            # Only patch if not already patched
            if ($content -notmatch "using brokkr::app::Result") {
              $patch = "// AUTO-PATCHED: resolve Status/Result namespace`n"
              $patch += "namespace brokkr { namespace core {`n"
              $patch += "  using Status = brokkr::app::Status;`n"
              $patch += "} }`n`n"
              $patch + $content | Set-Content $file -Encoding UTF8
              Write-Host "Patched namespace in $file" -ForegroundColor Green
            }
          }

      - name: Generate main.cpp
        shell: pwsh
        run: |
          if (!(Test-Path "src\app")) { New-Item -ItemType Directory -Force -Path "src\app" }
          $mainContent = @"
          #include "cli_mode.hpp"
          int main(int argc, char* argv[]) {
              if (brokkr::app::should_run_cli(argc, argv)) {
                  return brokkr::app::run_cli(argc, argv);
              }
              return 0;
          }
          "@
          $mainContent | Set-Content "src\app\main.cpp" -Encoding UTF8

      - name: Build ekoflash.exe (Static C++)
        shell: pwsh
        run: |
          $VCPKG_ROOT = "$env:VCPKG_INSTALLATION_ROOT"
          $VCPKG_INC = "$VCPKG_ROOT\installed\x64-windows-static\include"
          $VCPKG_LIB = "$VCPKG_ROOT\installed\x64-windows-static\lib"

          $sources = @(
            "src\protocol\odin\flash.cpp",
            "src\protocol\odin\group_flasher.cpp",
            "src\protocol\odin\odin_cmd.cpp",
            "src\protocol\odin\pit.cpp",
            "src\protocol\odin\pit_transfer.cpp",
            "src\core\thread_pool.cpp",
            "src\io\lz4_frame.cpp",
            "src\io\source.cpp",
            "src\io\tar.cpp",
            "src\platform\windows\app_dirs.cpp",
            "src\platform\windows\signal_shield.cpp",
            "src\platform\windows\single_instance.cpp",
            "src\platform\windows\sysfs_usb.cpp",
            "src\platform\windows\tcp_transport.cpp",
            "src\platform\windows\usbfs_conn.cpp",
            "src\platform\windows\usbfs_device.cpp",
            "src\app\cli_mode.cpp",
            "src\app\md5_verify.cpp",
            "src\app\md5_xxh3_cache.cpp",
            "src\app\main.cpp",
            "src\third_party\lz4\lz4.c",
            "src\third_party\md5\md5.c",
            "src\third_party\xxhash\xxhash.c"
          )

          $includes = @(
            "/I", "src",
            "/I", "src\core",
            "/I", "src\io",
            "/I", "src\platform\windows",
            "/I", "src\platform\posix-common",
            "/I", "src\protocol\odin",
            "/I", "src\app",
            "/I", "src\third_party\lz4",
            "/I", "src\third_party\md5",
            "/I", "src\third_party\xxhash",
            "/I", "$VCPKG_INC"
          )

          $defines = @(
            "/D", "BROKKR_PLATFORM_WINDOWS",
            "/D", "WIN32_LEAN_AND_MEAN",
            "/D", "NOMINMAX",
            "/D", "_WIN32_WINNT=0x0A00",
            "/D", "SPDLOG_FMT_EXTERNAL",
            "/D", "FMT_HEADER_ONLY=0",
            "/D", "XXH_STATIC_LINKING_ONLY",
            "/D", "XXH_IMPLEMENTATION"
          )

          $flags = @(
            "/std:c++20", "/O2", "/MT", "/EHsc", "/utf-8",
            "/Zc:__cplusplus", "/permissive-",
            "/wd4005"
          )

          $linkerFlags = @(
            "/link",
            "/LIBPATH:$VCPKG_LIB",
            "Ws2_32.lib", "SetupAPI.lib", "User32.lib",
            "Advapi32.lib", "fmt.lib"
          )

          & cl.exe $flags $includes $defines $sources /Fe:ekoflash.exe $linkerFlags

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Upload Engine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: odin-engine
          path: ekoflash.exe

  build-gui:
    name: Build EKOFLASH GUI & Final Bundle
    needs: build-engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Engine
        uses: actions/download-artifact@v4
        with:
          name: odin-engine
          path: .

      - name: Publish EKOFLASH PRO
        shell: pwsh
        run: |
          dotnet publish EkoFlashTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Rename and Finalize
        shell: pwsh
        run: |
          if (Test-Path "./publish/EkoFlashTool.exe") {
            Move-Item "./publish/EkoFlashTool.exe" "./publish/EKOFLASH_PRO_v3.0.exe" -Force
          }

      - name: Upload Final Release
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_PRO_BUNDLE
          path: ./publish/EKOFLASH_PRO_v3.0.exe
