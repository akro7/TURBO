name: Build EKOFLASH EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set up MSVC (for C++ build)
        uses: microsoft/setup-msbuild@v2

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Build ekoflash.exe (Odin C++ Engine)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          copy build\Release\ekoflash.exe ekoflash.exe

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Verify Assets
        run: |
          if (Test-Path "ekoflash.py")            { echo "Script found!" }       else { exit 1 }
          if (Test-Path "ekoflash.exe")           { echo "Engine found!" }       else { exit 1 }
          if (Test-Path "fastboot.exe")           { echo "Fastboot found!" }     else { exit 1 }
          if (Test-Path "adb.exe")                { echo "ADB found!" }          else { exit 1 }
          if (Test-Path "AdbWinApi.dll")          { echo "AdbWinApi found!" }    else { exit 1 }
          if (Test-Path "AdbWinUsbApi.dll")       { echo "AdbWinUsbApi found!" } else { exit 1 }
          if (Test-Path "libusb-1.0.dll")         { echo "libusb found!" }       else { exit 1 }
          if (Test-Path "zadig.exe")              { echo "Zadig found!" }        else { exit 1 }
          if (Test-Path "THIRD_PARTY_NOTICES.txt"){ echo "Notices found!" }      else { exit 1 }
          if (Test-Path "LICENSE")                { echo "LICENSE found!" }      else { exit 1 }

      - name: Build GUI EXE with PyInstaller
        run: |
          python -m PyInstaller --noconsole --onefile `
            --add-data "ekoflash.exe;." `
            --add-data "fastboot.exe;." `
            --add-data "adb.exe;." `
            --add-data "AdbWinApi.dll;." `
            --add-data "AdbWinUsbApi.dll;." `
            --add-data "libusb-1.0.dll;." `
            --add-data "zadig.exe;." `
            --add-data "THIRD_PARTY_NOTICES.txt;." `
            --add-data "LICENSE;." `
            --name "EKOFLASH_PRO_v3.0" ekoflash.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_TURBO
          path: dist/EKOFLASH_PRO_v3.0.exe
