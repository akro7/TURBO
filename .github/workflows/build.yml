name: turbo Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:

      # ==========================================
      # Checkout Repository
      # ==========================================
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================
      # Setup MSVC
      # ==========================================
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ==========================================
      # DEBUG PROJECT STRUCTURE
      # ==========================================
      - name: Show Project Structure
        shell: powershell
        run: |

          Write-Host "====================================="
          Write-Host " ROOT FILES "
          Write-Host "====================================="

          Get-ChildItem

          Write-Host ""
          Write-Host "====================================="
          Write-Host " ALL FILES "
          Write-Host "====================================="

          Get-ChildItem -Recurse -File | Select-Object FullName

      # ==========================================
      # Build TURBO FLASH TOOL
      # ==========================================
      - name: Build TURBO FLASH TOOL
        shell: powershell
        run: |

          $ErrorActionPreference = "Stop"

          Write-Host "====================================="
          Write-Host " Building TURBO FLASH TOOL"
          Write-Host "====================================="

          # ==========================================
          # Compiler Flags
          # ==========================================

          $flags = "/std:c++20 /O2 /MT /EHsc /utf-8 /Zc:__cplusplus /wd4005 /wd4996"

          # ==========================================
          # Defines
          # ==========================================

          $defines = @(
            "/D BROKKR_PLATFORM_WINDOWS",
            "/D WIN32",
            "/D _WINDOWS",
            "/D WIN32_LEAN_AND_MEAN",
            "/D NOMINMAX",
            "/D _WIN32_WINNT=0x0A00",
            "/D SPDLOG_FMT_EXTERNAL",
            "/D FMT_HEADER_ONLY=0"
          ) -join " "

          # ==========================================
          # Include Paths
          # ==========================================

          $includes = @(
            "/I external",
            "/I external\spdlog\include",
            "/I external\fmt\include",
            "/I external\lz4",
            "/I external\xxhash",
            "/I external\md5",
            "/I src"
          ) -join " "

          # ==========================================
          # Source Files
          # ==========================================

          $sources = @(
            "src\main.cpp",
            "src\engine.cpp",
            "src\cache.cpp",
            "src\utils.cpp",
            "src\platform_windows.cpp",

            "external\lz4\lz4.c",
            "external\md5\md5.c",
            "external\xxhash\xxhash.c"
          ) -join " "

          # ==========================================
          # Libraries
          # ==========================================

          $libs = @(
            "user32.lib",
            "advapi32.lib",
            "shell32.lib",
            "ole32.lib",
            "ws2_32.lib"
          ) -join " "

          # ==========================================
          # Build Command
          # ==========================================

          $cmd = "cl.exe $flags $defines $includes $sources /Fe:TURBO_FLASH_TOOL.exe /link $libs"

          Write-Host ""
          Write-Host "====================================="
          Write-Host " BUILD COMMAND "
          Write-Host "====================================="
          Write-Host $cmd
          Write-Host ""

          cmd /c $cmd

          # ==========================================
          # Validate Build
          # ==========================================

          if (!(Test-Path "TURBO_FLASH_TOOL.exe")) {
            throw "Engine Build Failed!"
          }

          Write-Host ""
          Write-Host "====================================="
          Write-Host " BUILD SUCCESSFUL "
          Write-Host "====================================="

      # ==========================================
      # Upload Artifact
      # ==========================================
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TURBO_FLASH_TOOL
          path: TURBO_FLASH_TOOL.exe
