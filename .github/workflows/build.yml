name: Build TURBO_FLASH_TOOL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qttools'

      - name: Build with CMake
        shell: pwsh
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release --verbose

      - name: Find and Upload EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build" -Recurse -Filter "TURBO_FLASH_TOOL.exe" -ErrorAction SilentlyContinue
          if ($exe) {
            Copy-Item $exe.FullName -Destination "TURBO_FLASH_TOOL.exe"
            Write-Host "EXE found and copied: $($exe.FullName)"
          } else {
            # Fallback search
            $exe = Get-ChildItem -Path "." -Recurse -Filter "*.exe" | Where-Object { $_.Name -like "*flash*" -or $_.Name -like "*turbo*" }
            if ($exe) { Copy-Item $exe[0].FullName -Destination "TURBO_FLASH_TOOL.exe" }
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TURBO_FLASH_TOOL
          path: TURBO_FLASH_TOOL.exe
