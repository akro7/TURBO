name: Build EKOFLASH PRO (Full Integration)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-engine:
    name: Build C++ Odin Engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install fmt:x64-windows-static spdlog:x64-windows-static
          vcpkg integrate install

      - name: Generate main.cpp entry point
        shell: pwsh
        run: |
          if (!(Test-Path "src\app")) { New-Item -ItemType Directory -Force -Path "src\app" }
          $mainContent = @"
          #include "cli_mode.hpp"
          int main(int argc, char* argv[]) {
              return brokkr::app::run_cli(argc, argv);
          }
          "@
          $mainContent | Set-Content "src\app\main.cpp" -Encoding UTF8

      - name: Build ekoflash.exe (Static C++)
        shell: pwsh
        run: |
          $INC_VCPKG = "C:\vcpkg\installed\x64-windows-static\include"
          $LIB_VCPKG = "C:\vcpkg\installed\x64-windows-static\lib"
          
          # تجميع كافة ملفات المصدر في مصفوفة (Array) لضمان تمريرها بشكل صحيح
          $srcFiles = @()
          $srcFiles += Get-ChildItem -Path "src\protocol\odin\*.cpp" | % { $_.FullName }
          $srcFiles += Get-ChildItem -Path "src\core\*.cpp" | % { $_.FullName }
          $srcFiles += Get-ChildItem -Path "src\io\*.cpp" | % { $_.FullName }
          $srcFiles += Get-ChildItem -Path "src\platform\windows\*.cpp" | % { $_.FullName }
          $srcFiles += Get-ChildItem -Path "src\app\*.cpp" | % { $_.FullName }
          $srcFiles += Get-ChildItem -Path "src\third_party\lz4\*.c" | % { $_.FullName }
          $srcFiles += Get-ChildItem -Path "src\third_party\md5\*.c" | % { $_.FullName }

          # الأعلام والمسارات كمصفوفة لمنع خطأ D9002
          $compilerFlags = @(
            "/std:c++20", "/O2", "/MT", "/EHsc", "/utf-8", "/Zc:__cplusplus",
            "/I", "src",
            "/I", "src\core",
            "/I", "src\io",
            "/I", "src\platform\windows",
            "/I", "src\protocol\odin",
            "/I", "src\app",
            "/I", "src\third_party\lz4",
            "/I", "src\third_party\md5",
            "/I", "$INC_VCPKG",
            "/D", "BROKKR_PLATFORM_WINDOWS",
            "/D", "WIN32_LEAN_AND_MEAN",
            "/D", "NOMINMAX",
            "/D", "_WIN32_WINNT=0x0A00",
            "/D", "SPDLOG_FMT_EXTERNAL"
          )

          $linkerFlags = @(
            "/link",
            "/LIBPATH:$LIB_VCPKG",
            "Ws2_32.lib", "SetupAPI.lib", "User32.lib", "Advapi32.lib", "fmt.lib"
          )

          Write-Host "Compiling Engine..."
          # استخدام عامل التشغيل & مع المصفوفات يضمن تمرير كل عنصر كـ Argument منفصل
          & cl.exe $compilerFlags $srcFiles /Fe:ekoflash.exe $linkerFlags

      - name: Upload Engine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: odin-engine
          path: ekoflash.exe

  build-gui:
    name: Build EKOFLASH GUI & Final Bundle
    needs: build-engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Engine
        uses: actions/download-artifact@v4
        with:
          name: odin-engine
          path: .

      - name: Publish EKOFLASH PRO
        shell: pwsh
        run: |
          # التأكد من وجود ملف المشروع بناءً على الصورة 42231
          dotnet publish EkoFlashTool.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Rename Final Output
        shell: pwsh
        run: |
          if (Test-Path "./publish/EkoFlashTool.exe") {
            Move-Item "./publish/EkoFlashTool.exe" "./publish/EKOFLASH_PRO_v3.0.exe" -Force
          }

      - name: Upload Final Release
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_TURBO_RELEASE
          path: ./publish/EKOFLASH_PRO_v3.0.exe
