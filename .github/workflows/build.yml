name: Build EKOFLASH PRO (Full Integration)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-engine:
    name: Build C++ Odin Engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies via vcpkg (Static)
        run: |
          vcpkg install fmt:x64-windows-static spdlog:x64-windows-static
          vcpkg integrate install

      - name: Generate main.cpp
        shell: pwsh
        run: |
          if (!(Test-Path "src\app")) { New-Item -ItemType Directory -Force -Path "src\app" }
          $mainContent = @"
          #include "cli_mode.hpp"
          int main(int argc, char* argv[]) {
              return brokkr::app::run_cli(argc, argv);
          }
          "@
          $mainContent | Set-Content "src\app\main.cpp" -Encoding UTF8

      - name: Build ekoflash.exe (Static C++ Engine)
        shell: pwsh
        run: |
          $VCPKG_INC = "C:\vcpkg\installed\x64-windows-static\include"
          $VCPKG_LIB = "C:\vcpkg\installed\x64-windows-static\lib"

          # قائمة الملفات "المجربة والناجحة" من كودك القديم
          $sources = @(
            "src\protocol\odin\flash.cpp",
            "src\protocol\odin\group_flasher.cpp",
            "src\protocol\odin\odin_cmd.cpp",
            "src\protocol\odin\pit.cpp",
            "src\protocol\odin\pit_transfer.cpp",
            "src\core\thread_pool.cpp",
            "src\io\lz4_frame.cpp",
            "src\io\source.cpp",
            "src\io\tar.cpp",
            "src\platform\windows\app_dirs.cpp",
            "src\platform\windows\signal_shield.cpp",
            "src\platform\windows\single_instance.cpp",
            "src\platform\windows\sysfs_usb.cpp",
            "src\platform\windows\tcp_transport.cpp",
            "src\platform\windows\usbfs_conn.cpp",
            "src\platform\windows\usbfs_device.cpp",
            "src\app\cli_mode.cpp",
            "src\app\md5_verify.cpp",
            "src\app\md5_xxh3_cache.cpp",
            "src\app\main.cpp",
            "src\third_party\lz4\lz4.c",
            "src\third_party\md5\md5.c"
          )

          $includes = @(
            "/I", "src",
            "/I", "src\core",
            "/I", "src\io",
            "/I", "src\platform\windows",
            "/I", "src\platform\posix-common",
            "/I", "src\protocol\odin",
            "/I", "src\app",
            "/I", "src\third_party\lz4",
            "/I", "src\third_party\md5",
            "/I", "src\third_party\xxhash",
            "/I", "$VCPKG_INC"
          )

          $defines = @(
            "/D", "BROKKR_PLATFORM_WINDOWS",
            "/D", "WIN32_LEAN_AND_MEAN",
            "/D", "NOMINMAX",
            "/D", "_WIN32_WINNT=0x0A00",
            "/D", "SPDLOG_FMT_EXTERNAL"
          )

          # تم استخدام std:c++20 لتجنب تحذيرات c++latest
          $flags = @(
            "/std:c++20", "/O2", "/MT", "/EHsc", "/utf-8", "/Zc:__cplusplus"
          )

          $linkerFlags = @(
            "/link",
            "/LIBPATH:$VCPKG_LIB",
            "Ws2_32.lib", "SetupAPI.lib", "User32.lib", "Advapi32.lib", "fmt.lib"
          )

          Write-Host "Compiling Engine..."
          & cl.exe $flags $includes $defines $sources /Fe:ekoflash.exe $linkerFlags

      - name: Upload Engine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: odin-engine
          path: ekoflash.exe

  build-gui:
    name: Build EKOFLASH GUI & Final Bundle
    needs: build-engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Engine
        uses: actions/download-artifact@v4
        with:
          name: odin-engine
          path: .

      - name: Verify and Publish
        shell: pwsh
        run: |
          # التأكد من وجود ekoflash.exe في الجذر ليتم تضمينه في ملف الـ C# (كما في الصورة 42230)
          if (Test-Path "ekoflash.exe") { 
            Write-Host "Engine found, proceeding to .NET Build..." -ForegroundColor Green 
          } else { 
            Write-Error "ekoflash.exe is missing!"; exit 1 
          }
          
          # بناء مشروع الـ C# (EkoFlashTool.csproj)
          dotnet publish EkoFlashTool.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Rename and Finalize
        shell: pwsh
        run: |
          if (Test-Path "./publish/EkoFlashTool.exe") {
            Move-Item "./publish/EkoFlashTool.exe" "./publish/EKOFLASH_PRO_v3.0.exe" -Force
            Write-Host "Final Bundle Created: EKOFLASH_PRO_v3.0.exe" -ForegroundColor Green
          }

      - name: Upload Final Release
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_PRO_BUNDLE
          path: ./publish/EKOFLASH_PRO_v3.0.exe
