name: Build EKOFLASH EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Verify Assets Existence
        run: |
          if (Test-Path "ekoflash.py") { echo "Script found!" } else { exit 1 }
          if (Test-Path "fastboot.exe") { echo "Fastboot found!" } else { exit 1 }
          if (Test-Path "adb.exe") { echo "ADB found!" } else { exit 1 }
          if (Test-Path "AdbWinApi.dll") { echo "AdbWinApi.dll found!" } else { exit 1 }
          if (Test-Path "AdbWinUsbApi.dll") { echo "AdbWinUsbApi.dll found!" } else { exit 1 }
          if (Test-Path "libusb-1.0.dll") { echo "libusb found!" } else { exit 1 }
          if (Test-Path "zadig.exe") { echo "Zadig found!" } else { exit 1 }
          if (Test-Path "THIRD_PARTY_NOTICES.txt") { echo "Notices found!" } else { exit 1 }
          if (Test-Path "LICENSE") { echo "LICENSE found!" } else { exit 1 }
          if (Test-Path "src") { echo "src found!" } else { exit 1 }
          if (Test-Path "tests") { echo "tests found!" } else { exit 1 }
          if (Test-Path "toolchains") { echo "toolchains found!" } else { exit 1 }

      - name: Build EXE with All Engines
        run: |
          python -m PyInstaller --noconsole --onefile `
          --add-data "fastboot.exe;." `
          --add-data "adb.exe;." `
          --add-data "AdbWinApi.dll;." `
          --add-data "AdbWinUsbApi.dll;." `
          --add-data "libusb-1.0.dll;." `
          --add-data "zadig.exe;." `
          --add-data "THIRD_PARTY_NOTICES.txt;." `
          --add-data "LICENSE;." `
          --add-data "src;src" `
          --add-data "src/app;src/app" `
          --add-data "src/core;src/core" `
          --add-data "src/io;src/io" `
          --add-data "src/platform;src/platform" `
          --add-data "src/protocol;src/protocol" `
          --add-data "src/third_party;src/third_party" `
          --add-data "toolchains;toolchains" `
          --add-data "tests;tests" `
          --name "EKOFLASH_PRO_v2.1" ekoflash.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_TURBO
          path: dist/EKOFLASH_PRO_v3.exe
