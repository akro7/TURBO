name: Build EKOFLASH PRO (Full Integration)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-engine:
    name: Build C++ Odin Engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install fmt + spdlog via vcpkg (Static)
        shell: pwsh
        run: |
          vcpkg install fmt:x64-windows-static spdlog:x64-windows-static
          vcpkg integrate install

      - name: Generate main.cpp entry point
        shell: pwsh
        run: |
          if (!(Test-Path "src\app")) { New-Item -ItemType Directory -Force -Path "src\app" }
          @"
          #include "cli_mode.hpp"
          int main(int argc, char* argv[]) {
              return brokkr::app::run_cli(argc, argv);
          }
          "@ | Set-Content "src\app\main.cpp" -Encoding UTF8

      - name: Build ekoflash.exe (Static C++)
        shell: pwsh
        run: |
          $VCPKG_INC = "C:\vcpkg\installed\x64-windows-static\include"
          $VCPKG_LIB = "C:\vcpkg\installed\x64-windows-static\lib"
          
          $sources = @(
            "src\protocol\odin\*.cpp",
            "src\core\*.cpp",
            "src\io\*.cpp",
            "src\platform\windows\*.cpp",
            "src\app\*.cpp",
            "src\third_party\lz4\lz4.c",
            "src\third_party\md5\md5.c"
          )
          
          $includes = @(
            "/I src", "/I src\core", "/I src\io", 
            "/I src\platform\windows", "/I src\protocol\odin", 
            "/I src\app", "/I src\third_party\lz4", 
            "/I src\third_party\md5", "/I `"$VCPKG_INC`""
          )
          
          $defines = @("/D BROKKR_PLATFORM_WINDOWS", "/D WIN32_LEAN_AND_MEAN", "/D NOMINMAX", "/D _WIN32_WINNT=0x0A00", "/D SPDLOG_FMT_EXTERNAL")
          $flags = @("/std:c++latest", "/O2", "/MT", "/EHsc", "/utf-8", "/Zc:__cplusplus")
          
          $srcList = $sources -join " "
          $inclList = $includes -join " "
          $defList = $defines -join " "
          $flagList = $flags -join " "
          
          $linkLibs = "Ws2_32.lib SetupAPI.lib User32.lib Advapi32.lib fmt.lib"
          
          cl.exe $flagList $inclList $defList $srcList /Fe:ekoflash.exe /link /LIBPATH:"$VCPKG_LIB" $linkLibs

      - name: Upload Engine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: odin-engine
          path: ekoflash.exe

  build-gui:
    name: Build EKOFLASH GUI & Final Bundle
    needs: build-engine
    runs-on: windows-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Engine Artifact
        uses: actions/download-artifact@v4
        with:
          name: odin-engine
          path: .

      - name: Verify All Embedded Assets
        shell: pwsh
        run: |
          $assets = @("ekoflash.exe", "adb.exe", "fastboot.exe", "AdbWinApi.dll", "AdbWinUsbApi.dll", "libusb-1.0.dll", "zadig.exe", "app.ico")
          foreach ($file in $assets) {
            if (Test-Path $file) { Write-Host "Verified: $file" }
            else { Write-Error "Missing critical asset: $file"; exit 1 }
          }

      - name: Publish EKOFLASH PRO (Single Executable)
        run: |
          dotnet publish ekoflashtool.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Rename Final Output
        shell: pwsh
        run: |
          Move-Item "./publish/EkoFlashTool.exe" "./publish/EKOFLASH_PRO_v3.0.exe"

      - name: Upload Final Release
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_TURBO_RELEASE
          path: ./publish/EKOFLASH_PRO_v3.0.exe
