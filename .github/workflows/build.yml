name: Build TURBO_FLASH_TOOL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # ── Install Qt using a more reliable method ──
      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qttools qt5compat'
          cache: true
          setup-python: false

      - name: Build with CMake
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DQt6_DIR="$env:Qt6_DIR/lib/cmake/Qt6"

          cmake --build build --config Release -j 4 --verbose

      - name: Upload Executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build" -Recurse -Filter "brokkr.exe" -ErrorAction SilentlyContinue
          if ($exe) {
            Copy-Item $exe.FullName -Destination "TURBO_FLASH_TOOL.exe"
            Write-Host "✅ Found: $($exe.FullName)"
          } else {
            Write-Warning "EXE not found, checking for any .exe"
            Get-ChildItem -Path "build" -Recurse -Filter "*.exe" | Select-Object FullName
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TURBO_FLASH_TOOL
          path: TURBO_FLASH_TOOL.exe
