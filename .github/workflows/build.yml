name: Build EKOFLASH PRO v3.0

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    env:
      # استخدام المتغير البيئي الافتراضي لـ vcpkg في GitHub Actions
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Dependencies via vcpkg
        shell: pwsh
        run: |
          # تثبيت المكتبات بشكل ثابت (Static)
          vcpkg install fmt spdlog --triplet x64-windows-static
          vcpkg integrate install

      - name: Generate Engine Entry Point (main.cpp)
        shell: pwsh
        run: |
          if (!(Test-Path "src\app")) { New-Item -ItemType Directory -Force -Path "src\app" }
          @"
          #include "cli_mode.hpp"
          int main(int argc, char* argv[]) {
              if (brokkr::app::should_run_cli(argc, argv)) {
                  return brokkr::app::run_cli(argc, argv);
              }
              return 0;
          }
          "@ | Set-Content "src\app\main.cpp" -Encoding UTF8

      - name: Fix md5_xxh3_cache Namespace
        shell: pwsh
        run: |
          $file = "src\app\md5_xxh3_cache.cpp"
          if (Test-Path $file) {
            $content = Get-Content $file -Raw
            if ($content -notmatch "NAMESPACE_FIX_APPLIED") {
              $fix = "// NAMESPACE_FIX_APPLIED`nnamespace brokkr { namespace core {`n    using Status = ::brokkr::app::Status;`n    template<typename T> using Result = ::brokkr::app::Result<T>;`n} }`n`n"
              $fixed = $content -replace '((?:#include[^\n]*\n)+)(?!#include)', "`$1`n$fix"
              $fixed | Set-Content $file -Encoding UTF8
            }
          }

      - name: Generate xxhash.c
        shell: pwsh
        run: |
          $dir = "src\third_party\xxhash"
          if (!(Test-Path $dir)) { New-Item -ItemType Directory -Force -Path $dir }
          $h = if (Test-Path "$dir\xxhash_vendor.h") { "xxhash_vendor.h" } else { "xxhash.h" }
          "#define XXH_STATIC_LINKING_ONLY`n#define XXH_IMPLEMENTATION`n#include `"$h`"" | Set-Content "$dir\xxhash.c" -Encoding UTF8

      - name: Build C++ Engine (ekoflash.exe)
        shell: pwsh
        run: |
          # تحديد مسارات vcpkg بدقة
          $VCPKG_INC = "${env:VCPKG_ROOT}\installed\x64-windows-static\include"
          $VCPKG_LIB = "${env:VCPKG_ROOT}\installed\x64-windows-static\lib"

          # تجميع ملفات المصدر
          $sources = @(
            "src\protocol\odin\*.cpp",
            "src\core\*.cpp",
            "src\io\*.cpp",
            "src\platform\windows\*.cpp",
            "src\app\*.cpp",
            "src\third_party\lz4\lz4.c",
            "src\third_party\md5\md5.c",
            "src\third_party\xxhash\xxhash.c"
          )
          $srcList = (Get-ChildItem -Path $sources).FullName -join " "

          $includes = "/I src /I src\core /I src\io /I src\platform\windows /I src\protocol\odin /I src\app /I src\third_party\lz4 /I src\third_party\md5 /I src\third_party\xxhash /I `"$VCPKG_INC`""
          $defines = "/D BROKKR_PLATFORM_WINDOWS /D WIN32_LEAN_AND_MEAN /D NOMINMAX /D _WIN32_WINNT=0x0A00 /D SPDLOG_FMT_EXTERNAL /D FMT_HEADER_ONLY=0"
          $flags = "/std:c++latest /O2 /MT /EHsc /utf-8 /Zc:__cplusplus /permissive- /wd4005 /wd4996"
          
          # ربط المكتبات مع المسار الكامل لمكتبات vcpkg
          $linkLibs = "Ws2_32.lib SetupAPI.lib User32.lib Advapi32.lib `"$VCPKG_LIB\fmt.lib`" `"$VCPKG_LIB\spdlog.lib`""

          $cmd = "cl.exe $flags $defines $includes $srcList /Fe:ekoflash.exe /link $linkLibs"
          Write-Host "Compiling Engine..." -ForegroundColor Cyan
          Invoke-Expression $cmd
          
          if (!(Test-Path "ekoflash.exe")) { throw "C++ Build Failed!" }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish GUI (WPF)
        shell: pwsh
        run: |
          dotnet publish EkoFlashTool.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Bundle All Assets
        shell: pwsh
        run: |
          # 1. نسخ المحرك الذي بنيناه
          Copy-Item "ekoflash.exe" "./publish/" -Force
          
          # 2. نسخ ملفات الأدوات المساعدة الموجودة في المستودع (adb, fastboot, dlls)
          $assets = @("adb.exe", "fastboot.exe", "AdbWinApi.dll", "AdbWinUsbApi.dll", "libusb-1.0.dll", "zadig.exe", "icon.ico")
          foreach ($f in $assets) {
            if (Test-Path $f) {
                Copy-Item $f "./publish/" -Force
                Write-Host "Bundled: $f" -ForegroundColor Green
            } else {
                Write-Warning "Asset missing from root: $f"
            }
          }

          # 3. إعادة تسمية الملف النهائي
          if (Test-Path "./publish/EkoFlashTool.exe") {
            Rename-Item "./publish/EkoFlashTool.exe" "EKOFLASH_PRO_v3.0.exe"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_PRO_FULL_BUNDLE
          path: ./publish/
