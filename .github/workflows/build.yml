name: Build EKOFLASH EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────────────────────
      - name: Check Out Repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────
      # 2. MSVC toolchain
      # ──────────────────────────────────────────────────────────────
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ──────────────────────────────────────────────────────────────
      # 3. vcpkg – static deps
      # ──────────────────────────────────────────────────────────────
      - name: Install dependencies via vcpkg (Static x64)
        shell: pwsh
        run: |
          vcpkg install fmt:x64-windows-static spdlog:x64-windows-static
          vcpkg integrate install

      # ──────────────────────────────────────────────────────────────
      # 4. Generate main.cpp entry point
      # ──────────────────────────────────────────────────────────────
      - name: Generate main.cpp entry point
        shell: pwsh
        run: |
          if (!(Test-Path "src\app")) {
            New-Item -ItemType Directory -Force -Path "src\app" | Out-Null
          }

          $main = @"
          // Auto-generated entry point
          #include "cli_mode.hpp"

          int main(int argc, char* argv[]) {
              return brokkr::app::run_cli(argc, argv);
          }
          "@
          Set-Content "src\app\main.cpp" $main -Encoding UTF8
          Write-Host "main.cpp generated OK"

      # ──────────────────────────────────────────────────────────────
      # 5. Build ekoflash.exe  (MSVC – fully static /MT)
      # ──────────────────────────────────────────────────────────────
      - name: Build ekoflash.exe
        shell: pwsh
        run: |
          $VCPKG_INC = "C:\vcpkg\installed\x64-windows-static\include"
          $VCPKG_LIB = "C:\vcpkg\installed\x64-windows-static\lib"

          # ── Source files ───────────────────────────────────────────
          $sources = @(
            # Protocol / Odin
            "src\protocol\odin\flash.cpp",
            "src\protocol\odin\group_flasher.cpp",
            "src\protocol\odin\odin_cmd.cpp",
            "src\protocol\odin\pit.cpp",
            "src\protocol\odin\pit_transfer.cpp",
            # Core
            "src\core\thread_pool.cpp",
            # IO
            "src\io\lz4_frame.cpp",
            "src\io\source.cpp",
            "src\io\tar.cpp",
            # Platform – Windows
            "src\platform\windows\app_dirs.cpp",
            "src\platform\windows\signal_shield.cpp",
            "src\platform\windows\single_instance.cpp",
            "src\platform\windows\sysfs_usb.cpp",
            "src\platform\windows\tcp_transport.cpp",
            "src\platform\windows\usbfs_conn.cpp",
            "src\platform\windows\usbfs_device.cpp",
            # App layer
            "src\app\cli_mode.cpp",
            "src\app\md5_verify.cpp",
            "src\app\md5_xxh3_cache.cpp",
            "src\app\main.cpp",
            # Third-party (C files compiled as C++)
            "src\third_party\lz4\lz4.c",
            "src\third_party\md5\md5.c"
          )

          # ── Include paths ──────────────────────────────────────────
          $includes = @(
            "/I src",
            "/I src\core",
            "/I src\io",
            "/I src\app",
            "/I src\platform\windows",
            "/I src\platform\posix-common",
            "/I src\protocol\odin",
            "/I src\third_party\lz4",
            "/I src\third_party\md5",
            "/I src\third_party\xxhash",
            "/I `"$VCPKG_INC`""
          )

          # ── Preprocessor defines ───────────────────────────────────
          $defines = @(
            "/D BROKKR_PLATFORM_WINDOWS",
            "/D WIN32_LEAN_AND_MEAN",
            "/D NOMINMAX",
            "/D _WIN32_WINNT=0x0A00",
            "/D SPDLOG_FMT_EXTERNAL",
            "/D _CRT_SECURE_NO_WARNINGS"
          )

          # ── Compiler flags ─────────────────────────────────────────
          $flags = @(
            "/std:c++latest",
            "/O2",
            "/MT",           # static CRT – no DLL dependency
            "/EHsc",
            "/utf-8",
            "/Zc:__cplusplus",
            "/W3",
            "/WX-",          # warnings are not errors
            "/permissive-"
          )

          # ── Link libraries ─────────────────────────────────────────
          $linkLibs = @(
            "Ws2_32.lib",
            "SetupAPI.lib",
            "User32.lib",
            "Advapi32.lib",
            "Hid.lib",
            "fmt.lib"
          )

          # ── Assemble & run cl.exe command ──────────────────────────
          $srcList    = ($sources  | ForEach-Object { "`"$_`"" }) -join " "
          $inclList   = $includes  -join " "
          $defineList = $defines   -join " "
          $flagList   = $flags     -join " "
          $libList    = $linkLibs  -join " "
          $libPath    = "/LIBPATH:`"$VCPKG_LIB`""

          $cmd = "cl.exe $flagList $inclList $defineList $srcList" +
                 " /Fe:ekoflash.exe" +
                 " /link $libPath $libList"

          Write-Host "=== Compiler command ==="
          Write-Host $cmd
          Write-Host "========================"

          Invoke-Expression $cmd

          if (-not (Test-Path "ekoflash.exe")) {
            Write-Error "BUILD FAILED: ekoflash.exe not produced"
            exit 1
          }

          $size = (Get-Item "ekoflash.exe").Length / 1MB
          Write-Host ("ekoflash.exe built OK  [{0:N2} MB]" -f $size)

      # ──────────────────────────────────────────────────────────────
      # 6. Verify bundled assets
      # ──────────────────────────────────────────────────────────────
      - name: Verify required assets
        shell: pwsh
        run: |
          $required = @(
            "ekoflash.exe",
            "fastboot.exe",
            "adb.exe",
            "AdbWinApi.dll",
            "AdbWinUsbApi.dll",
            "libusb-1.0.dll",
            "zadig.exe",
            "THIRD_PARTY_NOTICES.txt",
            "LICENSE",
            "icon.ico"
          )
          $missing = @()
          foreach ($f in $required) {
            if (Test-Path $f) { Write-Host "OK : $f" }
            else              { Write-Warning "MISSING: $f"; $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing files: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All assets present"

      # ──────────────────────────────────────────────────────────────
      # 7. Upload artifact
      # ──────────────────────────────────────────────────────────────
      - name: Upload ekoflash artifact
        uses: actions/upload-artifact@v4
        with:
          name: EKOFLASH_TURBO
          path: |
            ekoflash.exe
            fastboot.exe
            adb.exe
            AdbWinApi.dll
            AdbWinUsbApi.dll
            libusb-1.0.dll
            zadig.exe
            THIRD_PARTY_NOTICES.txt
            LICENSE
          retention-days: 30
