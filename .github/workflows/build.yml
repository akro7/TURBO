name: Build TURBO_FLASH_TOOL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      # حل مشكلة Python + Qt
      - name: Setup Python for Qt
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt 6.7
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qttools qt5compat'
          cache: true
          setup-python: false
          dir: '${{ github.workspace }}/Qt'

      - name: Build with CMake
        shell: pwsh
        run: |
          \( QtDir = " \){{ github.workspace }}/Qt/6.7*/msvc2019_64"
          
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_PREFIX_PATH="$QtDir" `
            -DQt6_DIR="$QtDir/lib/cmake/Qt6"

          cmake --build build --config Release --verbose -j 4

      - name: Find Executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build" -Recurse -Filter "brokkr.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName -Destination "TURBO_FLASH_TOOL.exe"
            Write-Host "✅ Success: TURBO_FLASH_TOOL.exe created"
          } else {
            Write-Host "Searching for any executable..."
            Get-ChildItem -Path "build" -Recurse -Filter "*.exe" | Select-Object FullName
            throw "Executable not found!"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TURBO_FLASH_TOOL
          path: TURBO_FLASH_TOOL.exe
